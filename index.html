<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Prayer Rule</title>
  <meta name="description" content="A premium Orthodox prayer rule PWA with guided prayer, centered Spotlight search, offline access, and a native-app-style interface." />
  <meta name="theme-color" content="#17110f" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="src/styles.css?v=24.0.0" />
</head>
<body>
  <div class="ambient-field" aria-hidden="true">
    <div class="aura aura-one"></div>
    <div class="aura aura-two"></div>
    <div class="aura aura-three"></div>
  </div>

  <main class="app-frame" id="app-frame">
    <header class="app-chrome" id="app-chrome">
      <button class="brand-button" type="button" data-nav="home" aria-label="Return to current prayer">
        <span aria-hidden="true">✦</span>
        <strong>Prayer Companion</strong>
      </button>
      <button class="menu-button" type="button" data-open-menu aria-label="Open prayer book menu"><i></i><i></i></button>
    </header>
    <section class="screen" id="screen" aria-live="polite">
      <div class="loading-panel">
        <div class="loading-orb"></div>
        <p>Preparing your prayer rule…</p>
      </div>
    </section>

  </main>

  <aside class="sheet" id="quick-sheet" aria-hidden="true" aria-label="Prayer book menu">
    <button class="sheet-backdrop" type="button" data-close-sheet></button>
    <div class="sheet-panel">
      <div class="sheet-handle"></div>
      <div class="sheet-head">
        <div>
          <p class="micro-label">Prayer Companion</p>
          <h2>Your prayer book</h2>
        </div>
        <button class="round-control" type="button" data-close-sheet aria-label="Close menu">×</button>
      </div>
      <nav class="menu-list" aria-label="Prayer book destinations">
        <button type="button" data-nav="home"><span>Current prayer</span><em>Return to today’s guided session</em></button>
        <button type="button" data-nav="daily"><span>Today in the Church</span><em>Saints, feasts, and appointed readings</em></button>
        <button type="button" data-nav="library"><span>Prayer library</span><em>Browse the complete prayer book</em></button>
        <button type="button" data-nav="search"><span>Find a prayer</span><em>Search by need, word, or occasion</em></button>
        <button type="button" data-open-companion><span>Prayer Companion <b class="ai-menu-mark">✦ AI</b></span><em>Reflect, find words, and understand prayers</em></button>
        <button type="button" data-open-communion="preparation"><span>Before Communion</span><em>Preparation prayers</em></button>
        <button type="button" data-open-communion="thanksgiving"><span>After Communion</span><em>Thanksgiving prayers</em></button>
        <button type="button" data-nav="settings"><span>Settings & intercessions</span><em>Reading comfort and remembered names</em></button>
      </nav>
      <p class="menu-section-label">Quick prayers</p>
      <div class="quick-list" id="quick-list"></div>
    </div>
  </aside>

  <aside class="assistant-panel" id="assistant-panel" aria-hidden="true" aria-label="Prayer guidance">
    <button class="assistant-backdrop" type="button" data-close-assistant aria-label="Close prayer guidance"></button>
    <div class="assistant-shell" id="assistant-content"></div>
  </aside>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="src/session-time.js?v=24.0.0" defer></script>
  <script src="src/app.js?v=24.0.0" defer></script>
  <script src="src/extra-prayers.js?v=24.0.0" defer></script>
</body>
</html>
