<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Prayer Rule</title>
  <meta name="description" content="A premium Orthodox prayer rule PWA with guided prayer, centered Spotlight search, offline access, and a native-app-style interface." />
  <meta name="theme-color" content="#17110f" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <div class="ambient-field" aria-hidden="true">
    <div class="aura aura-one"></div>
    <div class="aura aura-two"></div>
    <div class="aura aura-three"></div>
  </div>

  <main class="app-frame" id="app-frame">
    <section class="screen" id="screen" aria-live="polite">
      <div class="loading-panel">
        <div class="loading-orb"></div>
        <p>Preparing your prayer rule…</p>
      </div>
    </section>

    <nav class="bottom-dock" id="bottom-dock" aria-label="Primary navigation">
      <button class="dock-item active" type="button" data-nav="home"><svg class="dock-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4.5 10.6 12 4.4l7.5 6.2"/><path d="M6.8 9.7v9.1h10.4V9.7"/><path d="M9.6 18.8v-5.2h4.8v5.2"/></svg><em>Home</em></button>
      <button class="dock-item" type="button" data-nav="rule"><svg class="dock-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3.8v16.4"/><path d="M7.6 8.1h8.8"/><path d="M8.4 20.2h7.2"/><path d="M12 3.8c-1.5 1.8-2.6 3.9-2.6 6.2 0 4.1 2.6 6.7 2.6 10.2 0-3.5 2.6-6.1 2.6-10.2 0-2.3-1.1-4.4-2.6-6.2Z"/></svg><em>Rule</em></button>
      <button class="dock-item" type="button" data-nav="library"><svg class="dock-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5.3 5.5h10.4a3 3 0 0 1 3 3v10H8.1a2.8 2.8 0 0 0-2.8 2.2V5.5Z"/><path d="M5.3 18.5a2.8 2.8 0 0 1 2.8-2.2h10.6"/><path d="M8.3 8.5h7.1"/><path d="M8.3 11.5h5.8"/></svg><em>Library</em></button>
      <button class="dock-item" type="button" data-nav="search"><svg class="dock-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="10.8" cy="10.8" r="5.8"/><path d="m15.1 15.1 4.4 4.4"/></svg><em>Search</em></button>
      <button class="dock-item" type="button" data-nav="settings"><svg class="dock-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3.1"/><path d="M12 3.8v2.1M12 18.1v2.1M5.2 5.2l1.5 1.5M17.3 17.3l1.5 1.5M3.8 12h2.1M18.1 12h2.1M5.2 18.8l1.5-1.5M17.3 6.7l1.5-1.5"/></svg><em>Settings</em></button>
    </nav>
  </main>

  <aside class="sheet" id="quick-sheet" aria-hidden="true" aria-label="Quick prayers">
    <button class="sheet-backdrop" type="button" data-close-sheet></button>
    <div class="sheet-panel">
      <div class="sheet-handle"></div>
      <div class="sheet-head">
        <div>
          <p class="micro-label">Quick Prayers</p>
          <h2>Open a prayer</h2>
        </div>
        <button class="round-control" type="button" data-close-sheet aria-label="Close quick prayers">×</button>
      </div>
      <div class="quick-list" id="quick-list"></div>
    </div>
  </aside>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="src/app.js" defer></script>
</body>
</html>
